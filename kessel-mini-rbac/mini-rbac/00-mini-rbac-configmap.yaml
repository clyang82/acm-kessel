apiVersion: v1
kind: ConfigMap
metadata:
  name: acm-kessel-mini-rbac-config
  namespace: acm-kessel-mini-rbac
data:
  config.yaml: |
    server:
      http:
        addr: "0.0.0.0:8080"
        timeout: 30s
      grpc:
        addr: "0.0.0.0:9090"
        timeout: 30s
    database:
      host: "acm-kessel-postgres.acm-kessel-mini-rbac.svc.cluster.local"
      port: 5432
      user: "inventoryapi"
      password: "inventoryapipassword"
      dbname: "inventory"
      sslmode: "disable"
      max_open_conns: 25
      max_idle_conns: 5
      conn_max_lifetime: 5m
    kessel:
      relations_api:
        host: "acm-kessel-relations-api.acm-kessel-mini-rbac.svc.cluster.local"
        port: 9000
        tls_enabled: false
        timeout: 30s
    app:
      name: "mini-rbac"
      version: "0.1.0"
      env: "development"
      replication_enabled: true
