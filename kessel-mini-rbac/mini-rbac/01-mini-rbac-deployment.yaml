apiVersion: apps/v1
kind: Deployment
metadata:
  name: acm-kessel-mini-rbac
  namespace: acm-kessel-mini-rbac
  labels:
    app: acm-kessel-mini-rbac
    app.kubernetes.io/name: mini-rbac
    app.kubernetes.io/component: rbac
    app.kubernetes.io/part-of: acm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: acm-kessel-mini-rbac
  template:
    metadata:
      labels:
        app: acm-kessel-mini-rbac
    spec:
      containers:
      - name: mini-rbac
        image: quay.io/jmartine/mini-rbac-go:latest
        workingDir: /app
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: SPICEDB_ENDPOINT
          value: "acm-kessel-spicedb.acm-kessel-mini-rbac.svc.cluster.local:50051"
        - name: SPICEDB_TOKEN
          valueFrom:
            secretKeyRef:
              name: acm-kessel-spicedb-config
              key: preshared_key
        - name: PORT
          value: "8080"
        volumeMounts:
        - name: config
          mountPath: /app/config
          readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: config
        configMap:
          name: acm-kessel-mini-rbac-config
